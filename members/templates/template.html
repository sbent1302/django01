{% load static %}
<!DOCTYPE html>
<html>
<head>
  <!--link rel="stylesheet" type="text/css" href="{% static 'myfirst.css' %}"-->
  <link rel="stylesheet" type="text/css" href="{% static 'myglobal.css' %}">
</head>
<body>

<table border='1'>
  <tr>
    <th>ID</th>
    <th>Firstname</th>
    <th>Lastname</th>
    <th>Phone</th>
    <th>Joined</th>
  </tr>
  {% for x in mymembers %}
    <tr>
      <td>{{ x.id }}</td>
      <td>{{ x.firstname }}</td>
      <td>{{ x.lastname }}</td>
      <td>{{ x.phone }}</td>
      <td>{{ x.joined_date }}</td>
    </tr>
  {% endfor %}
</table>

</body>
</html>
